<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título dinámico: "Crear Producto" o "Editar Producto" -->
    <title th:text="${accion} + ' Producto'">Producto</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; background-color: #f8f9fa; color: #333; }
        h1 { color: #065A82; border-bottom: 2px solid #065A82; padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
        form { background: white; padding: 1.5rem 2rem; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); max-width: 600px; }
        label { display: block; margin-top: 1rem; font-weight: bold; color: #065A82; }
        input[type="text"], input[type="number"], textarea {
            width: 100%; padding: 9px 10px; box-sizing: border-box;
            margin-top: 5px; border: 1px solid #ccc; border-radius: 4px;
            font-size: 0.95rem; transition: border-color 0.2s;
        }
        input:focus, textarea:focus { outline: none; border-color: #065A82; }
        .acciones { margin-top: 1.5rem; display: flex; gap: 0.75rem; }
        .btn { padding: 9px 20px; cursor: pointer; border-radius: 4px; font-size: 0.95rem; text-decoration: none; display: inline-block; }
        .btn-save { background: #065A82; color: white; border: none; }
        .btn-save:hover { background: #054870; }
        .btn-cancel { background: #808080; color: white; }
        .btn-cancel:hover { background: #666; }
    </style>
</head>
<body>
    <!-- Encabezado dinámico según acción -->
    <h1 th:text="${accion} + ' Producto'">Producto</h1>

    <!--
        th:action  → envía a POST /productos/guardar
        th:object  → enlaza el formulario con el objeto "producto" del modelo
        method=post → cumple con el patrón PRG
    -->
    <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">

        <!--
            Campo oculto con el ID del producto.
            En creación el ID es null; en edición contiene el ID existente
            para que el servicio actualice el registro en vez de crear uno nuevo.
        -->
        <input type="hidden" th:field="*{id}">

        <label for="nombre">Nombre:</label>
        <input type="text" th:field="*{nombre}" id="nombre"
               placeholder="Ej: Laptop Gaming" required>

        <label for="descripcion">Descripción:</label>
        <textarea th:field="*{descripcion}" id="descripcion" rows="3"
                  placeholder="Breve descripción del producto"></textarea>

        <label for="precio">Precio ($):</label>
        <input type="number" th:field="*{precio}" id="precio"
               step="0.01" min="0" placeholder="0.00" required>

        <div class="acciones">
            <!-- Texto del botón cambia según la acción activa -->
            <button type="submit" class="btn btn-save"
                    th:text="${accion} + ' Producto'">Guardar</button>
            <!-- Vuelve a la lista sin guardar cambios -->
            <a th:href="@{/productos}" class="btn btn-cancel">Cancelar</a>
        </div>
    </form>
</body>
</html>
